# Run from the services/ root: docker compose -f artemis/docker-compose.yml up

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_MULTIPLE_DATABASES: auth_db,workout_planner_db,meal_planner_db,home_manager_db,vehicle_manager_db,work_planner_db,education_planner_db,content_planner_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  auth:
    build:
      context: ..
      dockerfile: auth/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/auth_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      REDIS_ENABLED: "true"
      PRIVATE_KEY_PATH: /app/keys/private.pem
      PUBLIC_KEY_PATH: /app/keys/public.pem
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - ../auth/keys:/app/keys:ro,z
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8090/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  workout-planner:
    build:
      context: ..
      dockerfile: workout-planner/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/workout_planner_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  meal-planner:
    build:
      context: ..
      dockerfile: meal-planner/Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/meal_planner_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8010/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  home-manager:
    build:
      context: ..
      dockerfile: home-manager/Dockerfile
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/home_manager_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8020/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  vehicle-manager:
    build:
      context: ..
      dockerfile: vehicle-manager/Dockerfile
    restart: unless-stopped
    ports:
      - "8030:8030"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/vehicle_manager_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8030/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  work-planner:
    build:
      context: ..
      dockerfile: work-planner/Dockerfile
    restart: unless-stopped
    ports:
      - "8040:8040"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/work_planner_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-production-32c}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8040/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  education-planner:
    build:
      context: ..
      dockerfile: education-planner/Dockerfile
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/education_planner_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8050/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  content-planner:
    build:
      context: ..
      dockerfile: content-planner/Dockerfile
    restart: unless-stopped
    ports:
      - "8060:8060"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/content_planner_db
      ARTEMIS_AUTH_URL: http://auth:8090
      ENVIRONMENT: production
      DISABLE_AUTH: "false"
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-production-32c}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8060/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  artemis:
    build:
      context: ..
      dockerfile: artemis/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ARTEMIS_AUTH_URL: http://auth:8090
      WORKOUT_PLANNER_URL: http://workout-planner:8000
      MEAL_PLANNER_URL: http://meal-planner:8010
      HOME_MANAGER_URL: http://home-manager:8020
      VEHICLE_MANAGER_URL: http://vehicle-manager:8030
      WORK_PLANNER_URL: http://work-planner:8040
      EDUCATION_PLANNER_URL: http://education-planner:8050
      CONTENT_PLANNER_URL: http://content-planner:8060
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      auth:
        condition: service_healthy
      workout-planner:
        condition: service_healthy
      meal-planner:
        condition: service_healthy
      home-manager:
        condition: service_healthy
      vehicle-manager:
        condition: service_healthy
      work-planner:
        condition: service_healthy
      education-planner:
        condition: service_healthy
      content-planner:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge
