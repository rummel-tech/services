---
# Kubernetes Secret template.
# DO NOT commit real credentials here.
# Populate with: kubectl create secret generic services-secrets \
#   --from-literal=DATABASE_URL='postgresql://...' \
#   --from-literal=JWT_SECRET='...' \
#   --from-literal=REDIS_URL='redis://...'
apiVersion: v1
kind: Secret
metadata:
  name: services-secrets
  namespace: default
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  REDIS_URL: "REPLACE_ME"
