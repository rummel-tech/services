---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-manager
  namespace: default
  labels:
    app: home-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: home-manager
  template:
    metadata:
      labels:
        app: home-manager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: home-manager
          image: rummeltech/home-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8020
          envFrom:
            - configMapRef:
                name: services-config
            - secretRef:
                name: services-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8020
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8020
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: home-manager
  namespace: default
  labels:
    app: home-manager
spec:
  selector:
    app: home-manager
  ports:
    - name: http
      port: 80
      targetPort: 8020
  type: ClusterIP
