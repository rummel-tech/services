---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: education-planner
  namespace: default
  labels:
    app: education-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: education-planner
  template:
    metadata:
      labels:
        app: education-planner
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: education-planner
          image: rummeltech/education-planner:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8050
          envFrom:
            - configMapRef:
                name: services-config
            - secretRef:
                name: services-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8050
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8050
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: education-planner
  namespace: default
  labels:
    app: education-planner
spec:
  selector:
    app: education-planner
  ports:
    - name: http
      port: 80
      targetPort: 8050
  type: ClusterIP
