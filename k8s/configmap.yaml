---
# ConfigMap for shared non-secret environment variables.
# Secrets (DB passwords, JWT keys, etc.) must be injected via Kubernetes Secrets
# or AWS Secrets Manager — never hardcoded here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: default
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  DEBUG: "false"
  REDIS_ENABLED: "false"
  # Artemis platform
  ARTEMIS_AUTH_URL: "http://auth"
  MODULES_CONFIG: "config/modules.yaml"
  REGISTRY_REFRESH_SECONDS: "300"
