name: Deploy Services to AWS

on:
  push:
    branches: [main]
    paths:
      - 'common/**'
      - 'artemis/**'
      - 'auth/**'
      - 'meal-planner/**'
      - 'home-manager/**'
      - 'vehicle-manager/**'
      - 'workout-planner/**'
      - 'work-planner/**'
      - 'education-planner/**'
      - 'content-planner/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - artemis
          - meal-planner
          - home-manager
          - vehicle-manager
          - workout-planner
          - work-planner
          - education-planner
          - content-planner
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine services to deploy
        id: set-matrix
        run: |
          ALL_SERVICES='["auth","artemis","meal-planner","home-manager","vehicle-manager","workout-planner","work-planner","education-planner","content-planner"]'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SERVICE="${{ github.event.inputs.service }}"
            if [[ "$SERVICE" == "all" ]]; then
              echo "services=${ALL_SERVICES}" >> $GITHUB_OUTPUT
            else
              echo "services=[\"${SERVICE}\"]" >> $GITHUB_OUTPUT
            fi
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            COMMON_CHANGED=$(echo "$CHANGED" | grep -q 'common/' && echo true || echo false)
            SERVICES=()

            for svc in auth artemis meal-planner home-manager vehicle-manager workout-planner work-planner education-planner content-planner; do
              if echo "$CHANGED" | grep -q "${svc}/" || [[ "$COMMON_CHANGED" == "true" ]]; then
                SERVICES+=("\"${svc}\"")
              fi
            done

            if [ ${#SERVICES[@]} -eq 0 ]; then
              echo "services=[]" >> $GITHUB_OUTPUT
            else
              JOINED=$(IFS=,; echo "${SERVICES[*]}")
              echo "services=[${JOINED}]" >> $GITHUB_OUTPUT
            fi
          fi

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '${{ matrix.service }}/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./common
          pip install -r ${{ matrix.service }}/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Create test environment
        working-directory: ${{ matrix.service }}
        run: |
          cat > .env << 'ENVEOF'
          ENVIRONMENT=test
          LOG_LEVEL=warning
          ENVEOF

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,__pycache__,.pytest_cache,migrations

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d "tests" ]; then
            pytest tests/ \
              --cov=. \
              --cov-report=term \
              --cov-report=xml \
              -v \
              --tb=short
          else
            echo "::warning::No tests/ directory found for ${{ matrix.service }}"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml
          retention-days: 30
          if-no-files-found: ignore

  deploy:
    needs: [detect-changes, test]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
        include:
          - service: auth
            port: 8090
          - service: artemis
            port: 8080
          - service: meal-planner
            port: 8010
          - service: home-manager
            port: 8020
          - service: vehicle-manager
            port: 8030
          - service: workout-planner
            port: 8000
          - service: work-planner
            port: 8040
          - service: education-planner
            port: 8050
          - service: content-planner
            port: 8060
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          # Use environment-scoped repo name: {environment}-{service}
          ECR_REPO="${{ env.ENVIRONMENT }}-${{ matrix.service }}"
          aws ecr describe-repositories --repository-names "$ECR_REPO" --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPO" --image-scanning-configuration scanOnPush=true --region $AWS_REGION
          echo "ECR_REPO=$ECR_REPO" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            --build-arg ENVIRONMENT=${{ env.ENVIRONMENT }} \
            --build-arg PORT=${{ matrix.port }} \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            .
          docker tag $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:latest
          docker tag $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:${{ env.ENVIRONMENT }}
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:${{ env.ENVIRONMENT }}

      - name: Update ECS service
        run: |
          CLUSTER="${{ env.ENVIRONMENT }}-cluster"
          # Use environment-scoped service name: {environment}-{service}-service
          SVC="${{ env.ENVIRONMENT }}-${{ matrix.service }}-service"
          SERVICE_EXISTS=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SVC \
            --region $AWS_REGION \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "")

          if [ "$SERVICE_EXISTS" == "ACTIVE" ]; then
            aws ecs update-service --cluster $CLUSTER --service $SVC --force-new-deployment --region $AWS_REGION
            echo "Waiting for $SVC to stabilize..."
            aws ecs wait services-stable --cluster $CLUSTER --services $SVC --region $AWS_REGION
          else
            echo "::warning::ECS service $SVC not found on $CLUSTER. Run Terraform first."
          fi

      - name: Deployment summary
        run: |
          echo "Deployed ${{ matrix.service }} (port ${{ matrix.port }}) to ${{ env.ENVIRONMENT }}"
          echo "ECR repo: $ECR_REPO"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:${{ github.sha }}"
