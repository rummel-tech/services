name: Deploy Services to AWS

on:
  push:
    branches: [main]
    paths:
      - 'common/**'
      - 'artemis/**'
      - 'meal-planner/**'
      - 'home-manager/**'
      - 'vehicle-manager/**'
      - 'workout-planner/**'
      - 'auth/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - artemis
          - meal-planner
          - home-manager
          - vehicle-manager
          - workout-planner
          - auth
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      artemis: ${{ steps.changes.outputs.artemis }}
      meal-planner: ${{ steps.changes.outputs.meal-planner }}
      home-manager: ${{ steps.changes.outputs.home-manager }}
      vehicle-manager: ${{ steps.changes.outputs.vehicle-manager }}
      workout-planner: ${{ steps.changes.outputs.workout-planner }}
      auth: ${{ steps.changes.outputs.auth }}
      common: ${{ steps.changes.outputs.common }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SERVICE="${{ github.event.inputs.service }}"
            if [[ "$SERVICE" == "all" ]]; then
              echo "artemis=true" >> $GITHUB_OUTPUT
              echo "meal-planner=true" >> $GITHUB_OUTPUT
              echo "home-manager=true" >> $GITHUB_OUTPUT
              echo "vehicle-manager=true" >> $GITHUB_OUTPUT
              echo "workout-planner=true" >> $GITHUB_OUTPUT
              echo "auth=true" >> $GITHUB_OUTPUT
              echo "common=true" >> $GITHUB_OUTPUT
            else
              echo "artemis=$([[ "$SERVICE" == "artemis" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "meal-planner=$([[ "$SERVICE" == "meal-planner" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "home-manager=$([[ "$SERVICE" == "home-manager" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "vehicle-manager=$([[ "$SERVICE" == "vehicle-manager" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "workout-planner=$([[ "$SERVICE" == "workout-planner" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "auth=$([[ "$SERVICE" == "auth" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "common=false" >> $GITHUB_OUTPUT
            fi
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "artemis=$(echo "$CHANGED" | grep -q 'artemis/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "meal-planner=$(echo "$CHANGED" | grep -q 'meal-planner/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "home-manager=$(echo "$CHANGED" | grep -q 'home-manager/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "vehicle-manager=$(echo "$CHANGED" | grep -q 'vehicle-manager/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "workout-planner=$(echo "$CHANGED" | grep -q 'workout-planner/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "auth=$(echo "$CHANGED" | grep -q 'auth/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "common=$(echo "$CHANGED" | grep -q 'common/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  deploy-artemis:
    needs: detect-changes
    if: needs.detect-changes.outputs.artemis == 'true' || needs.detect-changes.outputs.common == 'true'
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: artemis
      SERVICE_NAME: artemis
      SERVICE_PORT: 8080
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY --image-scanning-configuration scanOnPush=true --region $AWS_REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f $SERVICE_NAME/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update ECS service (if exists)
        continue-on-error: true
        run: |
          CLUSTER="${ENVIRONMENT}-cluster"
          SVC="${ENVIRONMENT}-${SERVICE_NAME}-service"
          aws ecs update-service --cluster $CLUSTER --service $SVC --force-new-deployment --region $AWS_REGION || \
            echo "ECS service $SVC not found, skipping update"

      - name: Deployment summary
        run: |
          echo "✅ $SERVICE_NAME deployed to $ENVIRONMENT!"
          echo "📦 Image: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}"

